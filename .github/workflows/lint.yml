name: Lint

on:
  push:
    branches: [main, develop, duck]
  pull_request:
    branches: [main, develop, duck]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10   # optional: specify your pnpm version
          run_install: true   # ✅ this installs pnpm so it's in PATH

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm lint
